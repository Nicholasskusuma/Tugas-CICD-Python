name: Python CI Pipeline

on: [push] 
jobs:
  test-logic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Jalankan Unit Test
        run: python test_validator.py